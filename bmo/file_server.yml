version: '3.8'

services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    restart: unless-stopped
    ports:
      - "8080:80" # Maps port 8080 on your server to the container
    volumes:
      - filebrowser_data:/srv
      - filebrowser_config:/database
    environment:
      - FB_DATABASE=/database/filebrowser.db

volumes:
  filebrowser_data:
  filebrowser_config:
