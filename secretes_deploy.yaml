version: "3.8"

services:
  # --- ADDED: Caddy Reverse Proxy ---
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "6550:6550"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - default

  backend:
    image: infisical/infisical:latest
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      - NODE_ENV=production
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
      - DB_CONNECTION_URI=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      # --- UPDATED: Site URL now reflects the IP and custom port ---
      - SITE_URL=https://10.0.1.90:6550
    networks:
      - default
      - dokploy-network

  db:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - infisical-db-data4:/var/lib/postgresql/data
    networks:
      - default

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - infisical-redis-data4:/data
    networks:
      - default

volumes:
  infisical-db-data4:
  infisical-redis-data4:
  # --- ADDED: Volumes to save the self-signed certs so they survive restarts ---
  caddy_data:
  caddy_config:

networks:
  dokploy-network:
    external: true
